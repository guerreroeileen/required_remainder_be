name: Build and Deploy Spring Boot to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY: required-remainder-backend
      IMAGE_TAG: ${GITHUB_SHA::7}
      CLUSTER_NAME: required-remainder-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get AWS Account ID
        id: aws
        run: echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Log in to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

      - name: Push image to ECR
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Update ECS service
        run: |
          # Check if the service exists
          SERVICE_EXISTS=$(aws ecs list-services --cluster ${{ env.CLUSTER_NAME }} --query 'serviceArns[?contains(@, `required-remainder`)]' --output text)
          
          if [ -z "$SERVICE_EXISTS" ]; then
            echo "ECS service does not exist yet. Please deploy the infrastructure first with DeployService=true"
            exit 1
          fi
          
          # Get the service name (remove the ARN prefix)
          SERVICE_NAME=$(echo $SERVICE_EXISTS | sed 's/.*\///')
          echo "Found ECS service: $SERVICE_NAME"
          
          # Update the task definition with new image
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.CLUSTER_NAME }} \
            --services $SERVICE_NAME \
            --query 'services[0].taskDefinition' \
            --output text)
          
          # Get current task definition
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN > task-def.json
          
          # Update image in task definition
          jq --arg IMAGE "$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
             '.taskDefinition | .containerDefinitions[0].image = $IMAGE | {containerDefinitions: .containerDefinitions, family: .family, taskRoleArn: .taskRoleArn, executionRoleArn: .executionRoleArn, networkMode: .networkMode, volumes: .volumes, placementConstraints: .placementConstraints, requiresCompatibilities: .requiresCompatibilities, cpu: .cpu, memory: .memory, tags: .tags, pidMode: .pidMode, ipcMode: .ipcMode, proxyConfiguration: .proxyConfiguration, inferenceAccelerators: .inferenceAccelerators}' > new-task-def.json
          
          # Register new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json --query 'taskDefinition.taskDefinitionArn' --output text)
          
          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ env.CLUSTER_NAME }} \
            --service $SERVICE_NAME \
            --task-definition $NEW_TASK_DEF_ARN

      - name: Wait for deployment
        run: |
          # Get the service name again
          SERVICE_EXISTS=$(aws ecs list-services --cluster ${{ env.CLUSTER_NAME }} --query 'serviceArns[?contains(@, `required-remainder`)]' --output text)
          SERVICE_NAME=$(echo $SERVICE_EXISTS | sed 's/.*\///')
          
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER_NAME }} \
            --services $SERVICE_NAME

      - name: Get deployment info
        run: |
          echo "Backend deployed successfully!"
          
          # Get the ALB URL from CloudFormation stack
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name required-remainder-backend \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerURL`].OutputValue' \
            --output text)
          
          echo ""
          echo "Backend URL: $ALB_URL"
          echo "Health Check: $ALB_URL/actuator/health"
          echo "API Endpoint: $ALB_URL/required-remainder"
